# cargo-audit configuration (https://docs.rs/cargo-audit)
#
# The `validate` CI job runs `cargo audit` as a gate. This file records the
# advisories we have intentionally decided NOT to fail the build on, because
# they are transitive (we cannot bump them directly), unmaintained build-only
# crates, or unsoundness in code paths our server deployment never exercises
# (e.g. the `gui` feature's GTK bindings, or `rand`'s custom-logger API).
#
# Any NEW advisory on a crate we actually depend on will still fail CI.
[advisories]
ignore = [
    # paste - unmaintained (transitive build-dependency, no security impact)
    "RUSTSEC-2024-0436",
    # proc-macro-error - unmaintained (transitive build-dependency)
    "RUSTSEC-2024-0370",
    # glib - unsound `VariantStrIter`; only reachable via the `gui` feature
    # (GTK desktop tray), never used by the headless Linux server build.
    "RUSTSEC-2024-0429",
    # rand - unsound only when combined with a custom logger calling
    # `rand::rng()`; our usage does not do this.
    "RUSTSEC-2026-0097",
]
