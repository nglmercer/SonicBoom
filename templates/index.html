<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicBoom TTS</title>
<style>
  :root {
    --primary: #0071e3;
    --primary-hover: #0077ed;
    --primary-disabled: #b0b8c1;
    --bg-main: #f5f5f7;
    --bg-card: #ffffff;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --border: #d2d2d7;
    --border-focus: #0071e3;
    --error: #d70015;
    --warning-bg: #fff3cd;
    --warning-text: #856404;
    --transition-speed: 0.2s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: var(--bg-card);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    padding: 2.25rem;
    width: 100%;
    max-width: 560px;
    transition: transform var(--transition-speed);
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    letter-spacing: -0.5px;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
  }

  textarea, select {
    width: 100%;
    padding: 0.75rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: #fafafa;
    outline: none;
    transition: border-color var(--transition-speed), background-color var(--transition-speed), box-shadow var(--transition-speed);
  }

  textarea:focus, select:focus {
    border-color: var(--border-focus);
    background: var(--bg-card);
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
  }

  textarea {
    resize: vertical;
    min-height: 140px;
    font-family: inherit;
    line-height: 1.5;
  }

  .row {
    display: flex;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .row .field { flex: 1; }

  button {
    width: 100%;
    padding: 0.85rem;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color var(--transition-speed), transform 0.1s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
  }

  button:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  button:active:not(:disabled) {
    transform: scale(0.99);
  }

  button:disabled {
    background: var(--primary-disabled);
    cursor: not-allowed;
  }

  /* Loading State Pulse */
  button.loading {
    animation: pulse 1.5s infinite ease-in-out;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.75; }
    100% { opacity: 1; }
  }

  #status {
    margin-top: 1.25rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
    min-height: 1.2em;
    text-align: center;
    font-weight: 500;
  }

  #status.error {
    color: var(--error);
  }

  audio {
    margin-top: 1.5rem;
    width: 100%;
    display: none;
    border-radius: 8px;
  }

  .model-status {
    margin-bottom: 1.5rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: var(--warning-bg);
    color: var(--warning-text);
    font-size: 0.875rem;
    font-weight: 500;
    border: 1px solid rgba(133, 100, 4, 0.15);
    display: BLOCK_STATUS;
  }

  .footer {
    margin-top: 1.75rem;
    font-size: 0.75rem;
    color: #aeaeb2;
    text-align: center;
  }

  .footer a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color var(--transition-speed);
  }

  .footer a:hover {
    color: var(--text-secondary);
  }
</style>
</head>
<body>
<div class="card">
  <h1>SonicBoom TTS</h1>
  <div class="model-status" id="modelStatus">STATUS_MSG</div>

  <div class="form-group">
    <label for="text">Text Input</label>
    <textarea id="text" placeholder="Enter text to convert to speech..."></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label for="voice">Voice Model</label>
      <select id="voice" VOICE_DISABLED>
        VOICE_OPTIONS
      </select>
    </div>
    <div class="field">
      <label for="lang">Language</label>
      <select id="lang" VOICE_DISABLED>
        <option value="en">English</option>
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="es">Spanish</option>
        <option value="pt">Portuguese</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="nl">Dutch</option>
        <option value="pl">Polish</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="id">Indonesian</option>
        <option value="th">Thai</option>
        <option value="sv">Swedish</option>
        <option value="da">Danish</option>
        <option value="fi">Finnish</option>
        <option value="el">Greek</option>
        <option value="cs">Czech</option>
        <option value="sk">Slovak</option>
        <option value="sl">Slovenian</option>
        <option value="hr">Croatian</option>
        <option value="ro">Romanian</option>
        <option value="hu">Hungarian</option>
        <option value="bg">Bulgarian</option>
        <option value="uk">Ukrainian</option>
        <option value="lt">Lithuanian</option>
        <option value="lv">Latvian</option>
        <option value="et">Estonian</option>
      </select>
    </div>
  </div>

  <button id="btn" BTN_DISABLED>Generate Speech</button>
  <div id="status"></div>
  <audio id="player" controls></audio>

  <p class="footer">
    Powered by <a href="https://huggingface.co/Supertone/supertonic-3" target="_blank" rel="noopener">Supertonic 3</a>
  </p>
</div>

<script>
// Backend-injected variable
const MODEL_READY = MODEL_READY_JS;

// DOM Cache
const textInput = document.getElementById('text');
const voiceSelect = document.getElementById('voice');
const langSelect = document.getElementById('lang');
const generateBtn = document.getElementById('btn');
const statusDiv = document.getElementById('status');
const audioPlayer = document.getElementById('player');

// Store active audio object URL to prevent memory leaks
let currentAudioUrl = null;

// Initialize Event Listeners
generateBtn.addEventListener('click', synthesize);

async function synthesize() {
  const text = textInput.value.trim();
  if (!text) {
    setStatus('Please enter some text.', true);
    return;
  }

  const voice = voiceSelect.value;
  const lang = langSelect.value;

  // Set UI Loading State
  generateBtn.disabled = true;
  generateBtn.classList.add('loading');
  generateBtn.textContent = 'Generating Speech...';
  setStatus('');

  try {
    const params = new URLSearchParams({ voice, lang });
    const resp = await fetch(`/api/tts?${params.toString()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: text,
    });

    if (!resp.ok) {
      const msg = await resp.text().catch(() => resp.statusText);
      throw new Error(`HTTP ${resp.status}: ${msg}`);
    }

    const blob = await resp.blob();

    // Revoke previous audio session URL to free up browser memory
    if (currentAudioUrl) {
      URL.revokeObjectURL(currentAudioUrl);
    }

    currentAudioUrl = URL.createObjectURL(blob);
    audioPlayer.src = currentAudioUrl;
    audioPlayer.style.display = 'block';

    // Play naturally, catching browser auto-play prevention errors
    audioPlayer.play().catch(err => {
      console.log("Audio waiting for user interaction to play: ", err);
    });

    setStatus('');
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    // Reset UI State
    generateBtn.disabled = false;
    generateBtn.classList.remove('loading');
    generateBtn.textContent = 'Generate Speech';
  }
}

function setStatus(msg, isError) {
  statusDiv.textContent = msg;
  statusDiv.className = isError ? 'error' : '';
}

// Refresh periodically if model is not ready yet
if (!MODEL_READY) {
  setTimeout(() => location.reload(), 5000);
}
</script>
</body>
</html>
