<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicBoom TTS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1d1d1f; }
  label { display: block; font-size: 0.85rem; color: #6e6e73; margin-bottom: 0.3rem; }
  textarea, select {
    width: 100%;
    padding: 0.65rem 0.8rem;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 1rem;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus, select:focus { border-color: #0071e3; background: #fff; }
  textarea { resize: vertical; min-height: 120px; font-family: inherit; }
  .row { display: flex; gap: 1rem; margin-top: 1rem; }
  .row .field { flex: 1; }
  button {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.75rem;
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: #0077ed; }
  button:disabled { background: #b0b8c1; cursor: not-allowed; }
  #status {
    margin-top: 1rem;
    font-size: 0.875rem;
    color: #6e6e73;
    min-height: 1.2em;
    text-align: center;
  }
  #status.error { color: #d70015; }
  audio { margin-top: 1rem; width: 100%; display: none; }
  .model-status {
    margin-bottom: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    background: #fff3cd;
    color: #856404;
    font-size: 0.875rem;
    display: BLOCK_STATUS;
  }
</style>
</head>
<body>
<div class="card">
  <h1>SonicBoom TTS</h1>
  <div class="model-status" id="modelStatus">STATUS_MSG</div>

  <label for="text">Text</label>
  <textarea id="text" placeholder="Enter text to convert to speech..."></textarea>

  <div class="row">
    <div class="field">
      <label for="voice">Voice Model</label>
      <select id="voice" VOICE_DISABLED>
        VOICE_OPTIONS
      </select>
    </div>
    <div class="field">
      <label for="lang">Language</label>
      <select id="lang" VOICE_DISABLED>
        <option value="en">English</option>
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="es">Spanish</option>
        <option value="pt">Portuguese</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="nl">Dutch</option>
        <option value="pl">Polish</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="id">Indonesian</option>
        <option value="th">Thai</option>
        <option value="sv">Swedish</option>
        <option value="da">Danish</option>
        <option value="fi">Finnish</option>
        <option value="el">Greek</option>
        <option value="cs">Czech</option>
        <option value="sk">Slovak</option>
        <option value="sl">Slovenian</option>
        <option value="hr">Croatian</option>
        <option value="ro">Romanian</option>
        <option value="hu">Hungarian</option>
        <option value="bg">Bulgarian</option>
        <option value="uk">Ukrainian</option>
        <option value="lt">Lithuanian</option>
        <option value="lv">Latvian</option>
        <option value="et">Estonian</option>
      </select>
    </div>
  </div>

  <button id="btn" onclick="synthesize()" BTN_DISABLED>Generate Speech</button>
  <div id="status"></div>
  <audio id="player" controls></audio>
  <p style="margin-top:1.5rem;font-size:0.75rem;color:#aeaeb2;text-align:center;">
    Powered by <a href="https://huggingface.co/Supertone/supertonic-3" target="_blank" rel="noopener"
       style="color:inherit;">Supertonic 3</a>
  </p>
</div>

<script>
const MODEL_READY = MODEL_READY_JS;

async function synthesize() {
  const text = document.getElementById('text').value.trim();
  if (!text) {
    setStatus('Please enter some text.', true);
    return;
  }

  const voice = document.getElementById('voice').value;
  const lang = document.getElementById('lang').value;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  setStatus('Generating...');

  try {
    const params = new URLSearchParams({ voice, lang });
    const resp = await fetch('/api/tts?' + params.toString(), {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: text,
    });

    if (!resp.ok) {
      const msg = await resp.text().catch(() => resp.statusText);
      throw new Error(`HTTP ${resp.status}: ${msg}`);
    }

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const player = document.getElementById('player');
    player.src = url;
    player.style.display = 'block';
    player.play();
    setStatus('');
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

// Refresh periodically if model is not ready yet
if (!MODEL_READY) {
  setTimeout(() => location.reload(), 5000);
}
</script>
</body>
</html>
